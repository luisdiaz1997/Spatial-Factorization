# TEST config for Liver diseased donor AM072 (10-epoch smoke test)
# Use: spatial_factorization run all -c configs/liver/diseased/AM072/general_test.yaml

name: liver_diseased_AM072_test
seed: 67
dataset: liver
output_dir: outputs/liver_test/diseased/AM072

preprocessing:
  spatial_scale: 50.0
  path: /gladstone/engelhardt/lab/lchumpitaz/datasets/liver/adata_healthy_diseased_merfish.h5ad
  cell_type_column: Cell_Type_final
  sample_id: AM072

  min_group_fraction: 0.01
model:
  n_components: 10
  mode: expanded
  loadings_mode: multiplicative
  training_mode: standard
  E: 3

  kernel: Matern32
  num_inducing: 3000
  lengthscale: 8.0
  sigma: 1.0
  train_lengthscale: false
  cholesky_mode: exp
  diagonal_only: false

  K: 50
  precompute_knn: true

  group_diff_param: 1.0
  inducing_allocation: derived

training:
  max_iter: 10
  learning_rate: 2e-3
  optimizer: Adam
  tol: 1e-4
  verbose: false
  device: gpu
  batch_size: 7000
  y_batch_size: 317
  shuffle: true
